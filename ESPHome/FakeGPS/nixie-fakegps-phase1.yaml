# =====================================================================
#  Nixie FakeGPS — Phase 1 additions
#  Paste these blocks into your ESPHome device config, BELOW the
#  wizard-generated  esphome: / esp32: / wifi: / api: / ota: / logger:
#  sections. (If one of these top-level keys already exists in your file,
#  merge the items under it instead of pasting a second copy.)
#
#  Goal: board online + OLED shows the time and WiFi signal.
#  Board: ESP32-C3 SuperMini + 0.42" (72x40) OLED  |  OLED I2C = GPIO5/6
# =====================================================================

# Accurate time, pulled straight from Home Assistant
time:
  - platform: homeassistant
    id: ha_time

# I2C bus for the onboard OLED
i2c:
  sda: GPIO5
  scl: GPIO6
  frequency: 800kHz

# WiFi signal — shown on the OLED and exposed to HA
sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: "FakeGPS WiFi RSSI"
    update_interval: 10s

# Fonts (fetched from Google Fonts at build time)
font:
  - file: "gfonts://Roboto"
    id: font_big
    size: 16
  - file: "gfonts://Roboto"
    id: font_small
    size: 8

# On-device web dashboard — browse to the device's IP address
web_server:
  port: 80

# Onboard 0.42" OLED.
# The visible 72x40 area sits INSIDE a 128x64 controller frame, so we use a
# 128x64 model and center everything (the buffer's center lands in the visible
# window). If the picture is shifted/garbled on your unit:
#   1) try changing  model: "SH1106 128x64"  ->  "SSD1306 128x64"
#   2) then nudge with nudge_x / nudge_y below.
display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    address: 0x3C
    id: oled
    update_interval: 1s
    pages:
      - id: page_home
        lambda: |-
          const int cx = it.get_width() / 2;   // ~64, inside the visible window
          const int nudge_x = 0;               // tweak if text is off to a side
          const int nudge_y = 0;               // tweak if text is too high/low
          auto t = id(ha_time).now();
          if (t.is_valid()) {
            it.strftime(cx + nudge_x, 13 + nudge_y, id(font_big),
                        TextAlign::TOP_CENTER, "%H:%M:%S", t);
          } else {
            it.print(cx + nudge_x, 13 + nudge_y, id(font_big),
                     TextAlign::TOP_CENTER, "--:--:--");
          }
          it.printf(cx + nudge_x, 33 + nudge_y, id(font_small),
                    TextAlign::TOP_CENTER, "WiFi %.0f dBm", id(wifi_rssi).state);
