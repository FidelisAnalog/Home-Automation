# =====================================================================
#  Nixie FakeGPS — spectrum18-masterbed  (reference copy)
#
#  This mirrors the config in the HAOS ESPHome builder. Only the device
#  identity, secrets, and network specifics live here — everything
#  project-side is pulled from git by the packages: block below.
#  Secrets (api key, wifi, AP password) stay in the builder / secrets.yaml.
# =====================================================================

esphome:
  name: spectrum18-masterbed
  friendly_name: spectrum18-masterbed

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: spectrum18-mast Fallback Hotspot
    password: !secret ap_password
  use_address: 172.30.13.104

captive_portal:

# Everything FakeGPS: component, device config, OLED, HA entities — from git
packages:
  fakegps:
    url: https://github.com/FidelisAnalog/Home-Automation
    ref: main
    files:
      - ESPHome/FakeGPS/fakegps-device.yaml
      - ESPHome/FakeGPS/fakegps-entities.yaml
    refresh: 0s
