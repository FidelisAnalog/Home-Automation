# =====================================================================
#  FakeGPS — device package (everything project-side, fetched from git)
#
#  The builder config keeps only: esphome/esp32 core, logger, api, ota,
#  wifi + secrets, captive_portal, and the packages: block pulling this
#  file and fakegps-entities.yaml.
#
#  Board: ESP32-C3 0.42" OLED | OLED I2C = GPIO5/6
#  Signal pins (GPS TX / PIR in / motion out) are HA config dropdowns,
#  defaults GPIO0 / GPIO1 / GPIO10 — no YAML edit to rewire.
#
#  Board variance: the substitutions below are defaults; override any of
#  them from the builder config with a substitutions: block there, e.g.
#      substitutions:
#        oled_sda: GPIO7
#        oled_nudge_y: "6"
# =====================================================================

substitutions:
  # Signal-pin dropdown: the four GPIOs offered and the boot defaults.
  # These are safe pins for the ESP32-C3 0.42" OLED board; other boards
  # override them (see README "Other boards").
  fakegps_pin_a: GPIO0
  fakegps_pin_b: GPIO1
  fakegps_pin_c: GPIO3
  fakegps_pin_d: GPIO10
  fakegps_tx_pin_default: GPIO0
  fakegps_pir_pin_default: GPIO1
  fakegps_motion_pin_default: GPIO10
  oled_sda: GPIO5
  oled_scl: GPIO6
  oled_model: "SH1106 128x64"
  oled_nudge_x: "0"
  oled_nudge_y: "8"

external_components:
  - source:
      type: git
      url: https://github.com/FidelisAnalog/Home-Automation
      ref: main
      path: ESPHome/FakeGPS/components
    components: [ fakegps ]
    refresh: 0s

fakegps:
  id: fgps
  time_id: ha_time
  baud: 9600
  invert: false
  time_offset_ms: 0
  sentence_interval: 5s
  off_delay: 15min
  restrobe_period: 1s   # == pulse width -> line held high while display-on

# Accurate time, pulled straight from Home Assistant
time:
  - platform: homeassistant
    id: ha_time

# I2C bus for the onboard OLED
i2c:
  sda: $oled_sda
  scl: $oled_scl
  frequency: 800kHz

# WiFi signal — shown on the OLED and exposed to HA
sensor:
  - platform: wifi_signal
    id: wifi_rssi
    name: "FakeGPS WiFi RSSI"
    update_interval: 10s
    web_server:
      sorting_group_id: sg_connectivity
      sorting_weight: 5

# Fonts (fetched from Google Fonts at build time)
font:
  - file: "gfonts://Roboto"
    id: font_big
    size: 16
  - file: "gfonts://Roboto"
    id: font_med
    size: 11

# On-device web dashboard — browse to the device's IP address.
# Entities are grouped by function (weights set per entity in
# fakegps-entities.yaml); groups render in sorting_weight order.
web_server:
  port: 80
  version: 3
  sorting_groups:
    - id: sg_connectivity
      name: "Connectivity"
      sorting_weight: 10
    - id: sg_gps
      name: "GPS"
      sorting_weight: 20
    - id: sg_motion
      name: "Motion"
      sorting_weight: 30
    - id: sg_hardware
      name: "Hardware"
      sorting_weight: 40

# Onboard 0.42" OLED. Visible 72x40 window inside a 128x64 controller frame;
# centered drawing with nudge_y=8 confirmed good on this unit. If a future
# unit is shifted: try SSD1306 model, then nudges (Amazon reviews claim the
# window offset is 28,24 — unvalidated).
#
# Pages cycle with the BOOT button only (no auto-rotate). Screen blanks
# after 5 min; BOOT wakes it (that press doesn't advance the page).
globals:
  - id: oled_last_tx
    type: uint32_t
    initial_value: '0'
  - id: oled_last_press_ms
    type: uint32_t
    initial_value: '0'
  - id: oled_blanked
    type: bool
    initial_value: 'false'

binary_sensor:
  - platform: gpio
    id: boot_button
    internal: true
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
    on_press:
      then:
        - lambda: |-
            id(oled_last_press_ms) = millis();
            if (id(oled_blanked)) {
              id(oled_blanked) = false;
              id(oled).turn_on();
            } else {
              id(oled).show_next_page();
            }
            id(oled).update();

interval:
  - interval: 10s
    then:
      - lambda: |-
          if (!id(oled_blanked) && (millis() - id(oled_last_press_ms)) > 300000) {
            id(oled_blanked) = true;
            id(oled).turn_off();
          }

display:
  - platform: ssd1306_i2c
    model: "$oled_model"
    address: 0x3C
    id: oled
    update_interval: 1s
    pages:
      # Home: time (--:--:-- until synced), WiFi bars, TX blink per burst
      - id: page_home
        lambda: |-
          const int cx = it.get_width() / 2;   // ~64, inside the visible window
          const int nudge_x = $oled_nudge_x;   // tweak if text is off to a side
          const int nudge_y = $oled_nudge_y;   // tweak if text is too high/low
          auto t = id(ha_time).now();
          if (t.is_valid() && id(fgps).is_synced()) {
            it.strftime(cx + nudge_x, 13 + nudge_y, id(font_big),
                        TextAlign::TOP_CENTER, "%H:%M:%S", t);
          } else {
            it.print(cx + nudge_x, 13 + nudge_y, id(font_big),
                     TextAlign::TOP_CENTER, "--:--:--");
          }
          // WiFi bars, bottom-left
          const int yb = 45 + nudge_y;  // bar baseline
          int rssi = id(fgps).wifi_rssi_now();
          int bars = rssi >= -55 ? 4 : rssi >= -65 ? 3 : rssi >= -75 ? 2 : rssi >= -85 ? 1 : 0;
          for (int i = 0; i < bars; i++) {
            int h = 3 * (i + 1);
            it.filled_rectangle(cx + nudge_x - 34 + i * 5, yb - h, 3, h);
          }
          // TX indicator, bottom-right: blinks the frame after each burst
          uint32_t txc = id(fgps).tx_count();
          if (txc != id(oled_last_tx)) {
            it.filled_circle(cx + nudge_x + 30, yb - 4, 3);
            id(oled_last_tx) = txc;
          }
      # Motion: PIR in, strobe out, mode
      - id: page_motion
        lambda: |-
          const int cx = it.get_width() / 2;
          const int x0 = cx + $oled_nudge_x - 34;
          const int y0 = 13 + $oled_nudge_y;
          it.print(x0, y0, id(font_med), "PIR");
          if (id(fgps).pir_state()) {
            it.filled_circle(x0 + 44, y0 + 5, 4);
          } else {
            it.circle(x0 + 44, y0 + 5, 4);
          }
          it.print(x0, y0 + 12, id(font_med), "OUT");
          if (id(fgps).strobe_recent()) {
            it.filled_circle(x0 + 44, y0 + 17, 4);
          } else {
            it.circle(x0 + 44, y0 + 17, 4);
          }
          const char *mode = id(fgps).motion_mode() == fakegps::MODE_ON ? "Force On"
                             : id(fgps).motion_mode() == fakegps::MODE_OFF ? "Force Off"
                                                                           : "Motion";
          it.print(x0, y0 + 24, id(font_med), mode);
      # Network: BSSID (two lines), channel, RSSI
      - id: page_net
        lambda: |-
          const int cx = it.get_width() / 2;
          const int x0 = cx + $oled_nudge_x - 34;
          const int y0 = 13 + $oled_nudge_y;
          std::string b = id(fgps).bssid();
          if (b.size() == 17) {
            it.print(x0, y0, id(font_med), b.substr(0, 8).c_str());
            it.print(x0, y0 + 12, id(font_med), b.substr(9).c_str());
          } else {
            it.print(x0, y0, id(font_med), b.c_str());
          }
          it.printf(x0, y0 + 24, id(font_med), "CH%d %ddBm",
                    id(fgps).wifi_channel(), id(fgps).wifi_rssi_now());
